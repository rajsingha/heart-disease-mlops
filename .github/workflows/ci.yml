name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src tests

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -v --tb=short
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-logs
          path: .pytest_cache
          if-no-files-found: ignore

  train:
    name: Train model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train models (uses committed cleaned dataset)
        run: python -m src.models.train
      - name: Upload trained model
        uses: actions/upload-artifact@v7
        with:
          name: model
          path: |
            models/model.joblib
            models/model_metadata.json
      - name: Upload MLflow runs and reports
        uses: actions/upload-artifact@v7
        with:
          name: mlflow-and-reports
          path: |
            mlruns
            mlflow.db
            reports

  docker:
    name: Build & smoke-test Docker image
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v7
      - name: Download trained model
        uses: actions/download-artifact@v8
        with:
          name: model
          path: models
      - name: Build image
        run: docker build -t heart-disease-api:ci .
      - name: Run container
        run: docker run -d --name api -p 8000:8000 heart-disease-api:ci
      - name: Wait for API to become healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker logs api
          exit 1
      - name: Smoke-test /predict
        run: |
          response=$(curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":57,"sex":1,"cp":4,"trestbps":140,"chol":241,"fbs":0,"restecg":0,"thalach":123,"exang":1,"oldpeak":0.2,"slope":2,"ca":0,"thal":7}')
          echo "$response"
          echo "$response" | python -c "import json,sys; b=json.load(sys.stdin); assert b['prediction'] in (0,1); assert 0<=b['probability']<=1"
      - name: Container logs
        if: always()
        run: docker logs api
