apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api
  labels:
    app: heart-disease-api
spec:
  # LoadBalancer works on Docker Desktop (localhost) and cloud (EKS/GKE/AKS).
  # On Minikube use `minikube service heart-disease-api` or `minikube tunnel`.
  type: LoadBalancer
  selector:
    app: heart-disease-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
