[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [".venv", "notebooks"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]
ignore = [
    "E402", # module import not at top — matplotlib.use("Agg") must precede pyplot
    "N803", # sklearn convention: X_train / X_test argument names
    "N806", # sklearn convention: X / X_train variable names
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
filterwarnings = [
    "ignore::DeprecationWarning:mlflow.*",
]
